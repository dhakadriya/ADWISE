# Netlify Configuration for Adwise Marketing System

[build]
  base = "adwise-marketing-system"
  command = "npm run build"
  publish = "adwise-marketing-system/build"

[build.environment]
  REACT_APP_API_URL = "https://adwise-tho4.onrender.com/api"

# Redirect all routes to index.html for React Router
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
